apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "csv-processor.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "csv-processor.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "csv-processor.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "csv-processor.name" . }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/nginx-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ default (include "csv-processor.fullname" .) .Values.serviceAccount.name }}

      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch

      initContainers:
        - name: publish-static-assets
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - cp -r /app/app/static/. /shared-static/
          volumeMounts:
            - name: static-files
              mountPath: /shared-static
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: application
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: LOCAL_STORAGE
              value: {{ .Values.s3.localStorage | quote }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: AWS_REGION
              value: {{ .Values.s3.region | quote }}
            - name: DYNAMODB_TABLE
              value: {{ .Values.metadata.dynamodbTable | quote }}
          volumeMounts:
            - name: static-files
              mountPath: /shared-static
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          command:
            - nginx
          args:
            - -g
            - daemon off;
          ports:
            - name: proxy
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: static-files
              mountPath: /usr/share/nginx/html/static
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-run
              mountPath: /var/run
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: static-files
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ include "csv-processor.fullname" . }}-nginx