apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: csv.example.com
spec:
  cloudProvider: aws
  configBase: s3://REPLACE_KOPS_STATE_BUCKET/csv.example.com
  kubernetesVersion: "1.30.0"
  subnets:
    - { name: us-east-1a, type: Public, zone: us-east-1a, cidr: 172.20.32.0/19 }
    - { name: us-east-1b, type: Public, zone: us-east-1b, cidr: 172.20.64.0/19 }
  networkCIDR: 172.20.0.0/16
  networking: { calico: {} }
  topology: { dns: Public, masters: public, nodes: public }
  authorization: { rbac: {} }
  api: { loadBalancer: { type: Public } }
  serviceAccountIssuerDiscovery:
    discoveryStore: s3://REPLACE_OIDC_BUCKET/discovery/csv.example.com
    enableAWSOIDCProvider: true
