apiVersion: v1
kind: ConfigMap
metadata: { name: {{ include "csv-processor.fullname" . }}-nginx }
data:
  default.conf: |
    server {
      listen 8080;
      client_max_body_size 11m;
      proxy_temp_path /tmp/proxy_temp;
      location /static/ { alias /usr/share/nginx/html/static/; }
      location / { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    }
