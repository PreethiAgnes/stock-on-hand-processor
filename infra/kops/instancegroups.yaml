apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata: { name: control-plane-us-east-1a, labels: { kops.k8s.io/cluster: csv.example.com } }
spec: { role: Master, machineType: t3.medium, minSize: 1, maxSize: 1, subnets: [us-east-1a] }
---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata: { name: nodes-on-demand, labels: { kops.k8s.io/cluster: csv.example.com } }
spec:
  role: Node
  machineType: m6i.large
  minSize: 2
  maxSize: 6
  subnets: [us-east-1a, us-east-1b]
  nodeLabels: { workload-tier: baseline, kops.k8s.io/instancegroup: nodes-on-demand }
---
apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata: { name: nodes-spot, labels: { kops.k8s.io/cluster: csv.example.com } }
spec:
  role: Node
  minSize: 0
  maxSize: 10
  subnets: [us-east-1a, us-east-1b]
  mixedInstancesPolicy:
    instances: [m6i.large, m5.large, m5a.large, m6a.large]
    onDemandBase: 0
    onDemandAboveBase: 0
    spotAllocationStrategy: capacity-optimized
  nodeLabels: { workload-tier: elastic, kops.k8s.io/instancegroup: nodes-spot }
  taints: ["spot=true:PreferNoSchedule"]
