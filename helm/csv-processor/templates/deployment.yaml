apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "csv-processor.fullname" . }}
  labels: { app.kubernetes.io/name: {{ include "csv-processor.name" . }} }
spec:
  replicas: {{ .Values.replicaCount }}
  selector: { matchLabels: { app.kubernetes.io/name: {{ include "csv-processor.name" . }} } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: {{ include "csv-processor.name" . }} }
    spec:
      serviceAccountName: {{ default (include "csv-processor.fullname" .) .Values.serviceAccount.name }}
      securityContext: { runAsNonRoot: true, fsGroup: 10001 }
      initContainers:
        - name: publish-static-assets
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["/bin/sh", "-c", "cp -r /app/app/static/. /shared-static/"]
          volumeMounts: [{ name: static-files, mountPath: /shared-static }]
          securityContext: { allowPrivilegeEscalation: false, runAsUser: 10001, capabilities: { drop: ["ALL"] } }
      containers:
        - name: application
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: nginx
          image: nginx:1.27-alpine
          command: ["nginx"]
          args: ["-g", "daemon off; pid /tmp/nginx.pid;"]
          ports: [{ containerPort: 8080, name: proxy }]
          volumeMounts:
            - { name: static-files, mountPath: /usr/share/nginx/html/static, readOnly: true }
            - { name: nginx-config, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf, readOnly: true }
          securityContext: { allowPrivilegeEscalation: false, runAsUser: 101, capabilities: { drop: ["ALL"] } }
      volumes:
        - name: static-files
          emptyDir: {}
        - name: nginx-config
          configMap: { name: {{ include "csv-processor.fullname" . }}-nginx }
