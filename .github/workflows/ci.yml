name: Validate and publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy
        required: true
        type: choice
        options: [dev, staging, production]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt
      - run: python -m pytest -q

      - uses: azure/setup-helm@v4
      - run: helm lint helm/csv-processor
      - run: helm template csv helm/csv-processor --set image.repository=example/csv --set image.tag=test > rendered.yaml

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - run: terraform -chdir=infra/s3 fmt -check
      - run: terraform -chdir=infra/s3 init -backend=false
      - run: terraform -chdir=infra/s3 validate

      - run: docker build -t stock-on-hand-processor:${{ github.sha }} .

  publish:
    name: Publish image to Docker Hub
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check Docker Hub repository setting
        env:
          REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: test -n "$REPOSITORY" || { echo "Set the DOCKERHUB_REPOSITORY variable in the development environment"; exit 1; }

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }}
            ${{ vars.DOCKERHUB_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max