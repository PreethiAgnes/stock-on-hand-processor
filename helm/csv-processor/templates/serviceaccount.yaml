{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "csv-processor.fullname" .) .Values.serviceAccount.name }}
  labels: { app.kubernetes.io/name: {{ include "csv-processor.name" . }} }
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
